<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ISO 45001 Certificate — Md. Imamuddin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      background: #2b2b2b;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px 16px;
    }

    .pdf-container {
      width: 100%;
      max-width: 860px;
      /* A4 portrait ratio */
      aspect-ratio: 1 / 1.414;
      box-shadow: 0 12px 48px rgba(0, 0, 0, 0.55);
      border-radius: 3px;
      overflow: hidden;
      background: #fff;
    }

    embed, iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* Fallback for mobile */
    .fallback {
      display: none;
      width: 100%;
      height: 100%;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
      padding: 32px;
      text-align: center;
      background: #fff;
      font-family: sans-serif;
      color: #444;
      font-size: 0.95rem;
    }

    .fallback a {
      color: #1a6b9a;
      font-weight: 700;
      text-decoration: underline;
    }

    .badge {
      margin-top: 18px;
      color: #ccc;
      font-family: Georgia, serif;
      font-size: 0.82rem;
      letter-spacing: 0.06em;
      text-align: center;
      opacity: 0.85;
    }

    .badge span {
      color: #fff;
      font-weight: bold;
    }

    @media (max-width: 480px) {
      body { padding: 12px 8px; }
    }
  </style>
</head>
<body>
  <div class="pdf-container">
    <embed
      src="ISO.pdf"
      type="application/pdf"
      title="ISO 45001 Certificate - Md. Imamuddin"
      onerror="this.style.display='none'; document.getElementById('fb').style.display='flex';"
    />
    <div id="fb" class="fallback">
      <p>PDF preview is not available on this browser.<br/>
         <a href="1779449156552_Imamuddin_ISO-45001_certificate.pdf" target="_blank">Tap here to open the certificate</a>
      </p>
    </div>
  </div>

  <p class="badge">Certified by <span>BSCIC Certifications Pvt. Ltd.</span> · CQI &amp; IRCA Approved Training Partner</p>
</body>
</html>
